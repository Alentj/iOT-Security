<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">

<h2>IoT Panel</h2>

<a href="dashboard.html">Dashboard</a>
<a href="devices.html">Devices</a>
<a href="logs.html">Security Logs</a>

</div>

<div class="main">

<h1>IoT Security Monitoring</h1>

<div class="cards">

<div class="card">
<h3>Total Devices</h3>
<p id="totalDevices">0</p>
</div>

<div class="card">
<h3>Online Devices</h3>
<p id="onlineDevices">0</p>
</div>

<div class="card">
<h3>Latest Moisture</h3>
<p id="latestMoisture">0%</p>
</div>

<div class="card">
<h3>Security Alerts</h3>
<p id="alertCount">0</p>
</div>

</div>

<h2>Moisture Chart</h2>
<canvas id="moistureChart"></canvas>

<h2>Device Status</h2>
<table id="deviceTable">
<tr>
<th>Device</th>
<th>Moisture</th>
<th>Status</th>
</tr>
</table>

<h2>Sensor Data</h2>
<table id="dataTable">
<tr>
<th>Device</th>
<th>Moisture</th>
</tr>
</table>

<!-- NEW FEATURE 1 -->
<h2>Security Events</h2>
<ul id="eventFeed"></ul>

<!-- NEW FEATURE 2 -->
<h2>Device Activity</h2>
<ul id="deviceActivity"></ul>

</div>

<script src="app.js"></script>

</body>
</html>
