<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics | Secure IoT Platform</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding-right: 20px;
        "
      >
        <h2 style="margin: 0; padding: 24px 0 24px 24px">
          <i class="fa-solid fa-leaf"></i> SmartAgri
        </h2>
        <button class="mobile-close-btn" onclick="toggleSidebar()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="nav-links">
        <a href="dashboard.html"><i class="fa-solid fa-house"></i> Overview</a>
        <a href="devices.html"><i class="fa-solid fa-satellite-dish"></i> Devices</a>
        <a href="alerts.html"><i class="fa-solid fa-bell"></i> Alerts</a>
        <a href="analytics.html" class="active"><i class="fa-solid fa-chart-line"></i> Analytics</a>
        <a href="logs.html"><i class="fa-solid fa-rectangle-list"></i> Logs</a>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
      <!-- TOP NAVBAR -->
      <div class="top-navbar">
        <div class="nav-left" style="display: flex; align-items: center;">
          <button class="hamburger-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="search-bar">
          <i class="fa-solid fa-search"></i>
          <input type="text" placeholder="Search..." />
        </div>
        <div class="nav-right">
          <div class="nav-profile">
            <div class="avatar" id="navAvatar" title="">U</div>
          </div>
          <span class="badge" id="navRoleBadge" style="font-size: 0.7rem; padding: 3px 8px"
            >Role</span
          >
          <button class="logout-btn" onclick="logout()" title="Logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>
      </div>

      <header class="header">
        <h1><i class="fa-solid fa-chart-line"></i> Analytics</h1>
        <p>In-depth insights into your connected ecosystem.</p>
      </header>

      <div
        style="
          text-align: center;
          margin-top: 100px;
          background: var(--surface-color);
          padding: 60px;
          border-radius: 16px;
          border: 1px solid var(--border-color);
        "
      >
        <h2 style="justify-content: center">
          <i class="fa-solid fa-person-digging fa-bounce"></i> Under Development
        </h2>
        <p style="color: var(--text-muted); font-size: 1.2rem; margin-top: 16px">
          Advanced analytics and machine-learning insights coming soon.
        </p>
      </div>
    </main>
  </body>
</html>
